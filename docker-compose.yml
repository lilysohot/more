version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: more_postgres
    environment:
      POSTGRES_USER: moremoney
      POSTGRES_PASSWORD: ${DB_PASSWORD:-moremoney123}
      POSTGRES_DB: moremoney_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U moremoney" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - more_network

  redis:
    image: redis:7-alpine
    container_name: more_redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - more_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: more_backend
    environment:
      DATABASE_URL: postgresql://moremoney:${DB_PASSWORD:-moremoney123}@postgres:5432/moremoney_db
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-your-32-byte-encryption-key-here!!!}
      DEBUG: "true"
    ports:
      - "8123:8000"
      - "5678:5678"  # 调试端口
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ../.trae/skills:/app/skills:ro
    networks:
      - more_network
    restart: unless-stopped
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:8123/api/v1
    container_name: more_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - more_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  more_network:
    driver: bridge
